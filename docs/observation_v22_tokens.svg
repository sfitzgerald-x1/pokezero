<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1120" height="400" rx="12" fill="#0f1419"/>

  <text x="40" y="46" fill="#e6edf3" font-size="22" font-weight="700">v2.2 observation — what the policy sees per decision</text>
  <text x="40" y="70" fill="#9aa7b4" font-size="13">One decision = 151 entity tokens; every token carries 51 categorical ids (embedding-row lookups) + 155 numeric features, plus a token-type id and attention mask.</text>

  <!-- stat cards -->
  <g font-size="12">
    <rect x="40" y="92" width="150" height="62" rx="10" fill="#171c24" stroke="#2a323d"/>
    <text x="58" y="122" fill="#e3b341" font-size="24" font-weight="700">151</text>
    <text x="58" y="140" fill="#9aa7b4">TOKENS / DECISION</text>
    <rect x="206" y="92" width="150" height="62" rx="10" fill="#171c24" stroke="#2a323d"/>
    <text x="224" y="122" fill="#e3b341" font-size="24" font-weight="700">51</text>
    <text x="224" y="140" fill="#9aa7b4">CATEGORICAL IDS</text>
    <rect x="372" y="92" width="150" height="62" rx="10" fill="#171c24" stroke="#2a323d"/>
    <text x="390" y="122" fill="#e3b341" font-size="24" font-weight="700">155</text>
    <text x="390" y="140" fill="#9aa7b4">NUMERIC FEATURES</text>
    <rect x="538" y="92" width="170" height="62" rx="10" fill="#171c24" stroke="#2a323d"/>
    <text x="556" y="122" fill="#e3b341" font-size="24" font-weight="700">841</text>
    <text x="556" y="140" fill="#9aa7b4">EMBEDDING ROWS</text>
    <rect x="724" y="92" width="356" height="62" rx="10" fill="#16202b" stroke="#2a323d"/>
    <text x="742" y="116" fill="#9aa7b4" font-size="11.5">Raw facts only: no type charts, damage calcs, or matchup</text>
    <text x="742" y="132" fill="#9aa7b4" font-size="11.5">summaries — mechanics must be learned from observation.</text>
    <text x="742" y="148" fill="#9aa7b4" font-size="11.5">Opponent hidden state enters only via the public belief.</text>
  </g>

  <!-- token strip (151 tokens, to scale: x = 40 + idx * 6.887) -->
  <text x="40" y="196" fill="#e6edf3" font-size="14" font-weight="600">Token sequence (to scale)</text>

  <!-- field: idx 0, w=6.9 -->
  <rect x="40" y="210" width="6.9" height="46" fill="#5a4a1f" stroke="rgba(255,255,255,.15)"/>
  <!-- self: idx 1-6 -->
  <rect x="46.9" y="210" width="41.3" height="46" fill="#1f5a4a" stroke="rgba(255,255,255,.15)"/>
  <text x="67.5" y="238" fill="#cfeeda" font-size="10.5" font-weight="600" text-anchor="middle">self ×6</text>
  <!-- opponent: idx 7-12 -->
  <rect x="88.2" y="210" width="41.3" height="46" fill="#5a1f3a" stroke="rgba(255,255,255,.15)"/>
  <text x="108.9" y="238" fill="#f4c2cc" font-size="10.5" font-weight="600" text-anchor="middle">opp ×6</text>
  <!-- actions: idx 13-21 -->
  <rect x="129.5" y="210" width="62" height="46" fill="#1f3a5a" stroke="rgba(255,255,255,.15)"/>
  <text x="160.5" y="232" fill="#a6c8ff" font-size="10.5" font-weight="600" text-anchor="middle">actions ×9</text>
  <text x="160.5" y="246" fill="#7ea0c8" font-size="9" text-anchor="middle">4 mv · 5 sw</text>
  <!-- stats: idx 22 -->
  <rect x="191.5" y="210" width="6.9" height="46" fill="#6b3a2f" stroke="rgba(255,255,255,.15)"/>
  <!-- transition: idx 23-150 -->
  <rect x="198.4" y="210" width="881.6" height="46" fill="#2e3440" stroke="rgba(255,255,255,.15)"/>
  <g stroke="#3a4250" stroke-width="1">
    <line x1="253.5" y1="210" x2="253.5" y2="256"/><line x1="308.6" y1="210" x2="308.6" y2="256"/>
    <line x1="363.7" y1="210" x2="363.7" y2="256"/><line x1="418.8" y1="210" x2="418.8" y2="256"/>
    <line x1="473.9" y1="210" x2="473.9" y2="256"/><line x1="529.0" y1="210" x2="529.0" y2="256"/>
    <line x1="584.1" y1="210" x2="584.1" y2="256"/><line x1="639.2" y1="210" x2="639.2" y2="256"/>
    <line x1="694.3" y1="210" x2="694.3" y2="256"/><line x1="749.4" y1="210" x2="749.4" y2="256"/>
    <line x1="804.5" y1="210" x2="804.5" y2="256"/><line x1="859.6" y1="210" x2="859.6" y2="256"/>
    <line x1="914.7" y1="210" x2="914.7" y2="256"/><line x1="969.8" y1="210" x2="969.8" y2="256"/>
    <line x1="1024.9" y1="210" x2="1024.9" y2="256"/>
  </g>
  <text x="639" y="232" fill="#c8d1dc" font-size="11" font-weight="600" text-anchor="middle">turn-merged transition tokens ×128</text>
  <text x="639" y="247" fill="#8b96a5" font-size="9.5" text-anchor="middle">the model's memory: window-size 1 + what happened, per resolved action, since its last decision</text>

  <!-- callout lines for the two 1-token slivers -->
  <line x1="43.5" y1="210" x2="43.5" y2="186" stroke="#5a4a1f" stroke-width="1.5"/>
  <text x="43" y="180" fill="#e3b341" font-size="10" font-weight="600">field (0)</text>
  <line x1="195" y1="256" x2="195" y2="280" stroke="#6b3a2f" stroke-width="1.5"/>
  <text x="195" y="292" fill="#d9917c" font-size="10" font-weight="600" text-anchor="middle">stats (22)</text>

  <!-- index ruler -->
  <g fill="#5c6773" font-size="9">
    <text x="40" y="270">0</text><text x="86" y="270">7</text>
    <text x="126" y="270">13</text><text x="198" y="270">23</text><text x="1068" y="270">150</text>
  </g>

  <!-- per-token composition -->
  <text x="40" y="322" fill="#e6edf3" font-size="14" font-weight="600">Each token</text>
  <rect x="40" y="334" width="380" height="34" rx="6" fill="#171c24" stroke="#2a323d"/>
  <text x="52" y="355" fill="#a6c8ff" font-size="11.5">51 categorical ids — 9 fixed + belief buckets + volatiles + tt2</text>
  <rect x="428" y="334" width="330" height="34" rx="6" fill="#1d4e6b" stroke="#2a323d"/>
  <text x="440" y="355" fill="#cfe6f5" font-size="11.5">155 numeric — HP, boosts, PP, weather, hazards, exact stats…</text>
  <rect x="766" y="334" width="314" height="34" rx="6" fill="#3a2f6b" stroke="#2a323d"/>
  <text x="778" y="355" fill="#d5cdf2" font-size="11.5">string → closed-vocab row (824 + 16 OOV + pad)</text>
</svg>
