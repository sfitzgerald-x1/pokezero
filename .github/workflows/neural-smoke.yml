name: Neural smoke

on:
  pull_request:
    paths:
      - ".github/workflows/neural-smoke.yml"
      - "pyproject.toml"
      - "src/pokezero/__init__.py"
      - "src/pokezero/collection.py"
      - "src/pokezero/neural_cli.py"
      - "src/pokezero/neural_policy.py"
      - "tests/test_neural_policy.py"

jobs:
  neural-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install neural extra
        run: python -m pip install -e '.[neural]'

      - name: Run neural policy tests
        run: python -m unittest tests.test_neural_policy
